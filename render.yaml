services:
  - type: web
    name: kitpak-whatsapp-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WATI_API_URL
        sync: false
      - key: WATI_API_TOKEN
        sync: false
